<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHEO AI | Community Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1E160F;
            --card: #2D2218;
            --soft: #3D2F23;
            --text: #F6F2EA;
            --muted: #A39684;
            --border: #3D2F23;
            --accent: #D4AF37;
            --accent-soft: rgba(212, 175, 55, 0.15);
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex;
            min-height: 100vh;
        }

        /* САЙДБАР СЛЕВА */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 260px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--accent);
            margin-bottom: 40px;
            padding-left: 15px;
            letter-spacing: -1px;
        }

        nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        
        nav a {
            display: flex; align-items: center; gap: 16px; padding: 14px 16px;
            text-decoration: none; color: var(--muted); font-weight: 500;
            border-radius: var(--radius); transition: 0.3s; cursor: pointer;
        }

        nav a svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }
        
        nav a:hover { color: var(--text); background: var(--soft); }
        
        nav a.active { 
            background: var(--accent); 
            color: #1E160F; 
            font-weight: 700; 
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        main { flex: 1; margin-left: 260px; padding: 40px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 850px; }

        .page { display: none; }
        .page.active { display: block; animation: smoothShow 0.5s ease; }

        @keyframes smoothShow {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ЛЕНТА (КАРТОЧКИ) */
        .feed { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        
        .post {
            background: var(--card); border-radius: var(--radius); padding: 20px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        
        .post:hover { border-color: var(--accent); }
        
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .avatar-sm { width: 35px; height: 35px; border-radius: 50%; background: var(--soft); border: 1px solid var(--border); }
        
        .post img { 
            width: 100%; border-radius: calc(var(--radius) - 8px); 
            margin-bottom: 15px; display: block; object-fit: cover; max-height: 300px;
            background: var(--soft);
        }

        .ai-badge {
            background: var(--soft); padding: 10px 14px; border-radius: 12px;
            font-size: 11px; display: flex; justify-content: space-between;
            color: var(--accent); border: 1px solid var(--accent-soft);
        }

        /* ФОРМА ЗАГРУЗКИ */
        .card-custom { 
            background: var(--card); border-radius: var(--radius); 
            padding: 30px; border: 1px solid var(--border); 
        }

        .drop-zone {
            border: 2px dashed var(--border); padding: 50px; text-align: center;
            border-radius: var(--radius); cursor: pointer; color: var(--muted);
            transition: 0.3s;
        }
        .drop-zone:hover { border-color: var(--accent); color: var(--accent); }

        input, select, textarea {
            width: 100%; background: var(--soft); border: 1px solid var(--border);
            color: var(--text); padding: 14px; border-radius: 14px;
            font-family: inherit; margin-top: 15px;
        }

        .btn-action {
            background: var(--accent); color: #1E160F; border: none; width: 100%;
            padding: 16px; border-radius: var(--radius); font-weight: 700;
            margin-top: 20px; cursor: pointer; transition: 0.3s;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-soft); }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 900px) {
            .sidebar { width: 80px; padding: 20px 10px; align-items: center; }
            .logo, nav a span { display: none; }
            main { margin-left: 80px; padding: 20px; }
            .feed { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">ARCHEO AI</div>
    <nav>
        <a data-tab="feed" class="active">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
            <span>Лента</span>
        </a>
        <a data-tab="create">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-width="2.5" stroke-linecap="round"/></svg>
            <span>Выложить</span>
        </a>
        <a data-tab="profile">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </a>
        <a data-tab="settings">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
            <span>Настройки</span>
        </a>
    </nav>
</aside>

<main>
    <div class="container">
        
        <section id="feed" class="page active">
            <div class="feed" id="feedContainer"></div>
        </section>

        <section id="create" class="page">
            <div class="card-custom">
                <h2 style="margin-bottom:20px; font-family:'Playfair Display'">Новая публикация</h2>
                <div id="dropZone" class="drop-zone">Нажмите сюда, чтобы загрузить фото артефакта</div>
                <div id="previewContainer"></div>
                <select id="category">
                    <option value="Керамика">Керамика</option>
                    <option value="Монеты">Нумизматика</option>
                    <option value="Оружие">Оружие и инструменты</option>
                    <option value="Украшения">Ювелирные изделия</option>
                </select>
                <textarea id="description" placeholder="Опишите контекст находки..."></textarea>
                <button class="btn-action" onclick="handlePublish()">Опубликовать в базу</button>
            </div>
        </section>

        <section id="profile" class="page">
            <div class="card-custom" style="text-align:center">
                <div class="avatar-sm" style="width:100px; height:100px; margin:0 auto 20px; background:var(--soft); border:2px solid var(--accent)"></div>
                <h2 style="font-family:'Playfair Display'">Explorer_Alpha</h2>
                <p style="color:var(--muted); margin-top:10px">Почетный археолог сообщества</p>
                <div style="display:flex; justify-content:center; gap:40px; margin-top:30px; border-top:1px solid var(--border); padding-top:20px">
                    <div><b style="display:block; font-size:22px" id="statsPosts">0</b>Находок</div>
                    <div><b style="display:block; font-size:22px" id="statsRating">0</b>Рейтинг</div>
                </div>
                <button onclick="deleteDatabase()" style="margin-top:50px; background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:10px 20px; border-radius:12px; cursor:pointer">Очистить базу данных</button>
            </div>
        </section>

        <section id="settings" class="page">
            <div class="card-custom">
                <h2 style="margin-bottom:20px">Кастомизация</h2>
                <div style="display:grid; gap:20px">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span>Цвет акцента</span>
                        <input type="color" id="accentColor" value="#D4AF37" onchange="applyUI('accent', this.value)">
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span>Скругление углов</span>
                        <input type="range" min="0" max="40" value="20" oninput="applyUI('radius', this.value + 'px')">
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span>Фон приложения</span>
                        <input type="color" id="bgColor" value="#1E160F" onchange="applyUI('bg', this.value)">
                    </div>
                </div>
            </div>
        </section>

    </div>
</main>

<script>
    // --- ИНИЦИАЛИЗАЦИЯ БАЗЫ ДАННЫХ ---
    let db = JSON.parse(localStorage.getItem('archeo_ai_database')) || [];
    let rating = parseInt(localStorage.getItem('archeo_ai_rating')) || 0;

    function syncDB() {
        try {
            localStorage.setItem('archeo_ai_database', JSON.stringify(db));
            localStorage.setItem('archeo_ai_rating', rating.toString());
            updateStats();
        } catch (e) {
            alert("Ошибка сохранения: база данных переполнена. Попробуйте загрузить фото меньшего размера или очистите базу.");
        }
    }

    // --- ЛОГИКА ИНТЕРФЕЙСА ---
    document.querySelectorAll('nav a').forEach(link => {
        link.onclick = () => {
            document.querySelectorAll('nav a').forEach(el => el.classList.remove('active'));
            link.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(link.dataset.tab).classList.add('active');
            if(link.dataset.tab === 'feed') renderFeed();
        };
    });

    function applyUI(prop, val) {
        document.documentElement.style.setProperty('--' + prop, val);
        if(prop === 'accent') document.documentElement.style.setProperty('--accent-soft', val + '26');
        localStorage.setItem('ui_' + prop, val);
    }

    // --- ЗАГРУЗКА И СЖАТИЕ ФОТО ---
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.createElement('input'); 
    fileInput.type = 'file'; fileInput.accept = 'image/*';

    let uploadedImgBase64 = null;

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                // Движок сжатия
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; // Оптимально для ленты
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // Превращаем в легкий JPEG
                uploadedImgBase64 = canvas.toDataURL('image/jpeg', 0.7); 
                
                document.getElementById('previewContainer').innerHTML = `<img src="${uploadedImgBase64}" style="width:100%; border-radius:15px; margin-top:15px; border:1px solid var(--accent)">`;
                dropZone.style.display = 'none';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function handlePublish() {
        if(!uploadedImgBase64) return alert("Пожалуйста, выберите фото!");
        
        const materials = ["Бронза", "Обожженная глина", "Базальт", "Слоновая кость", "Золотой сплав"];
        const post = {
            id: Date.now(),
            user: "Explorer_" + Math.floor(Math.random() * 999),
            category: document.getElementById('category').value,
            text: document.getElementById('description').value || "Артефакт найден в ходе экспедиции.",
            image: uploadedImgBase64,
            ai: {
                material: materials[Math.floor(Math.random() * materials.length)],
                confidence: Math.floor(92 + Math.random() * 7)
            }
        };

        db.unshift(post);
        rating += 15;
        syncDB();
        
        resetForm();
        renderFeed();
        document.querySelector('[data-tab="feed"]').click();
    }

    function resetForm() {
        uploadedImgBase64 = null;
        document.getElementById('previewContainer').innerHTML = "";
        document.getElementById('description').value = "";
        dropZone.style.display = 'block';
        fileInput.value = "";
    }

    function renderFeed() {
        const container = document.getElementById('feedContainer');
        container.innerHTML = db.length ? "" : "<p style='color:var(--muted); grid-column: 1/-1; text-align:center; padding: 50px;'>База данных пуста. Загрузите свою первую находку!</p>";
        
        db.forEach(item => {
            container.innerHTML += `
                <div class="post">
                    <div class="post-header">
                        <div class="avatar-sm"></div>
                        <div>
                            <div style="font-weight:600; font-size:13px">${item.user}</div>
                            <div style="font-size:11px; color:var(--muted)">${item.category} • Найдено</div>
                        </div>
                    </div>
                    <img src="${item.image}">
                    <div style="font-size:14px; margin-bottom:15px; line-height:1.5">${item.text}</div>
                    <div class="ai-badge">
                        <span><b>AI SCAN:</b> ${item.ai.material}</span>
                        <span>Точность: ${item.ai.confidence}%</span>
                    </div>
                </div>
            `;
        });
    }

    function updateStats() {
        document.getElementById('statsPosts').innerText = db.length;
        document.getElementById('statsRating').innerText = rating;
    }

    function deleteDatabase() {
        if(confirm("Вы действительно хотите удалить все посты? Это действие нельзя отменить.")) {
            localStorage.removeItem('archeo_ai_database');
            localStorage.removeItem('archeo_ai_rating');
            db = [];
            rating = 0;
            renderFeed();
            updateStats();
            alert("База очищена.");
        }
    }

    // --- ЗАПУСК ПРИ СТАРТЕ ---
    ['accent', 'bg', 'radius'].forEach(p => {
        const saved = localStorage.getItem('ui_' + p);
        if(saved) applyUI(p, saved);
    });
    
    renderFeed();
    updateStats();
</script>

</body>
</html>
